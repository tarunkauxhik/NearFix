# Local production-style stack: Postgres + NearFix web.
#
# Prerequisites:
#   1) Copy env.example to .env in the repo root.
#   2) Set VITE_CLERK_PUBLISHABLE_KEY and CLERK_SECRET_KEY in .env (Compose substitutes ${...} from .env).
#   3) First time only — apply schema to the compose DB from your host:
#        $env:DATABASE_URL = "postgresql://nearfix:nearfix@127.0.0.1:5433/nearfix"
#        npx drizzle-kit push
#      (port 5433 is the host mapping below; use 127.0.0.1 while Postgres is up.)
#
# Then: docker compose up --build
# App: http://localhost:8080  — health: http://localhost:8080/api/health
#
# To use Neon instead of the local db service: create docker-compose.override.yml
# (gitignored by default) setting web.environment.DATABASE_URL to your Neon URL.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nearfix
      POSTGRES_PASSWORD: nearfix
      POSTGRES_DB: nearfix
    ports:
      - "5433:5432"
    volumes:
      - nearfix_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nearfix -d nearfix"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
        VITE_PUBLIC_URL: ${VITE_PUBLIC_URL:-http://localhost:8080}
        VITE_APP_NAME: ${VITE_APP_NAME:-NearFix}
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
    ports:
      - "8080:10000"
    environment:
      PORT: "10000"
      NODE_ENV: production
      DATABASE_URL: postgresql://nearfix:nearfix@db:5432/nearfix
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      VITE_PUBLIC_URL: ${VITE_PUBLIC_URL:-http://localhost:8080}
    depends_on:
      db:
        condition: service_healthy

volumes:
  nearfix_pgdata:
